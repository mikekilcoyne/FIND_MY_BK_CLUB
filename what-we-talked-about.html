<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breakfast Club — What We Talked About</title>
    <link rel="stylesheet" href="./css/word-cloud.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #0d1824;
      }

      #clubs-list {
        display: none;
      }
    </style>
  </head>
  <body data-word-cloud-preview="true">
    <div id="clubs-list" aria-hidden="true"></div>

    <div id="wc-overlay" class="wc-overlay" hidden aria-modal="true" role="dialog" aria-label="What we talked about">
      <button class="wc-overlay-close" id="wc-overlay-close" aria-label="Close">×</button>
      <button class="wc-overlay-nav wc-overlay-nav--prev" id="wc-overlay-prev" aria-label="Previous club">&#8592;</button>
      <button class="wc-overlay-nav wc-overlay-nav--next" id="wc-overlay-next" aria-label="Next club">&#8594;</button>
      <div class="wc-overlay-header">
        <span class="wc-overlay-preamble" id="wc-overlay-preamble">
          <span id="wc-overlay-preamble-text">What we talked about...</span>
          <span class="wc-overlay-preamble-caret" aria-hidden="true"></span>
        </span>
        <span class="wc-overlay-city" id="wc-overlay-city"></span>
        <span class="wc-overlay-meta" id="wc-overlay-meta"></span>
        <span class="wc-overlay-source-date" id="wc-overlay-source-date" hidden></span>
      </div>
      <div class="wc-overlay-body">
        <div id="wc-overlay-stage" class="wc-overlay-stage"></div>
        <div id="wc-overlay-art" class="wc-overlay-art" aria-hidden="true" hidden>
          <img id="wc-overlay-photo" class="wc-overlay-photo" src="" alt="" aria-hidden="true" hidden />
          <span class="wc-overlay-attribution" id="wc-overlay-attribution" hidden></span>
        </div>
      </div>
      <p class="wc-overlay-hint">swipe or use arrows to browse · swipe up to close</p>
    </div>

    <script src="./js/analytics-config.js"></script>
    <script src="./js/analytics.js"></script>
    <script src="./js/club-overrides.js"></script>
    <script src="./js/wordcloud2.js"></script>
    <script src="./js/word-cloud-topics.js"></script>
    <script src="./js/word-cloud.js"></script>
    <script src="./js/what-we-talked-about.js"></script>
  </body>
</html>
