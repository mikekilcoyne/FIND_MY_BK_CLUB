<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breakfast Club — What We Talked About</title>
    <meta
      name="description"
      content="See what Breakfast Clubs around the world have been talking about, in the approved full-screen recap view."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/bk-club-icon.svg" />
    <link rel="shortcut icon" href="./assets/bk-club-icon.svg" />
    <link rel="stylesheet" href="./css/what-we-talked-about.css" />
  </head>
  <body class="wwta-page">
    <main class="wwta-view" aria-label="What we talked about">
      <div id="wwta-photo-layer" class="wwta-photo-layer" aria-hidden="true"></div>

      <a class="wwta-back-link" href="./index.html">← Back to club list</a>
      <a class="wwta-close-link" href="./index.html" aria-label="Close recap view">×</a>

      <button class="wwta-nav wwta-nav--prev" id="wwta-prev" type="button" aria-label="Previous club">
        ←
      </button>
      <button class="wwta-nav wwta-nav--next" id="wwta-next" type="button" aria-label="Next club">
        →
      </button>

      <header class="wwta-header">
        <span class="wwta-preamble" id="wwta-preamble">
          <span id="wwta-preamble-text">What we talked about...</span>
          <span class="wwta-preamble-caret" aria-hidden="true"></span>
        </span>
        <span class="wwta-city" id="wwta-club-title">BK Club Hamptons</span>
        <span class="wwta-meta" id="wwta-meta">Tutto Cafe | Every Wednesday | 8:30 AM</span>
        <span class="wwta-source-date" id="wwta-source-date" hidden></span>
        <a
          class="wwta-source-link"
          id="wwta-source-link"
          href="#"
          target="_blank"
          rel="noreferrer"
          hidden
        >Open source recap ↗</a>
      </header>

      <section class="wwta-body">
        <div id="wwta-stage" class="wwta-stage" aria-live="polite"></div>
      </section>

      <footer class="wwta-footer">
        <div class="wwta-footer-row">
          <p id="wwta-status" class="wwta-status">Loading recap feed...</p>
          <p id="wwta-counter" class="wwta-counter"></p>
        </div>
        <div id="wwta-club-pills" class="wwta-club-pills" aria-label="Browse clubs"></div>
        <p class="wwta-hint">swipe or use arrows to browse · source feed: Breakfast Clubbing on Substack</p>
      </footer>
    </main>

    <script src="./js/analytics-config.js"></script>
    <script src="./js/analytics.js"></script>
    <script src="./js/club-overrides.js"></script>
    <script src="./js/what-we-talked-about.js"></script>
  </body>
</html>
