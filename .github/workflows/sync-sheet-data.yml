name: Sync Breakfast Club Sheet

on:
  schedule:
    # Every 3 days at 13:00 UTC
    - cron: "0 13 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-sheet-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync data.csv from Google Sheet
        run: ./scripts/sync-sheet-csv.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data.csv; then
            echo "No data.csv changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git commit -m "chore(data): sync Google Sheet CSV"
          git push
